# RusTunnel — client configuration
ws_url     = "wss://rp.hermesbackend.xyz/tunnel"
auth_token = "change-me-secret"

[[tunnel]]
name        = "minecraft"
remote_port = 25565
local_port  = 25565
protocol    = "tcp"

[[tunnel]]
# HTTP tunnel: server auto-assigns a temporary UUID endpoint URL.
# No remote_port needed.
name       = "api"
local_port = 3000
protocol   = "http"
